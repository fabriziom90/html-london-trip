<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaggio a Londra</title>
</head>

<body>
    <!-- HEADER: TITOLO E IMMAGINI -->
    <header>
        <h1>Viaggio a Londra</h1>
        <!-- IMAGES -->
        <div>
            <img src="./img/pexels-bill-emrich-230794-0.jpg" alt="London 1">
            <img src="./img/pexels-bill-emrich-230794-1.jpg" alt="London 2">
            <img src="./img/pexels-bill-emrich-230794-2.jpg" alt="London 3">
        </div>
    </header>
    <hr>
    <!-- MAIN: TABELLA E LISTE -->
    <main>
        <h2>Le mie spese</h2>
        <!-- TABELLA -->
        <table>
            <!-- INTESTAZIONE TABELLA -->
            <thead>
                <tr>
                    <td><strong>Numero</strong></td>
                    <td><strong>Descrizione</strong></td>
                    <td><strong>Costo</strong></td>
                </tr>
            </thead>
            <!-- CORPO TABELLA -->
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Biglietto Aereo</td>
                    <td>120&euro;</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Biglietto Aereo</td>
                    <td>120&euro;</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Biglietto Aereo</td>
                    <td>120&euro;</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="2">Totale</td>
                    <td>360&euro;</td>
                </tr>
            </tfoot>
        </table>
    </main>
</body>

</html>
